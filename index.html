<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharma Ji Ki Shaadi 🌟</title>
    <style>
        /* CSS Reset & Variable Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* प्यारा वेडिंग एस्थेटिक बैकग्राउंड (Blush Pink & Rose Gold gradient) */
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1, #fbd3e9);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #4a2c3a;
            overflow-x: hidden;
        }

        /* ऑडियो परमिशन पॉपअप स्टाइल */
        #audio-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 44, 58, 0.85); /* मैचिंग डार्क ब्लश बैकग्राउंड */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            animation: fadeIn 0.5s ease-out;
        }

        .popup-box {
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 85%;
            border: 2px solid #ff85a1;
        }

        .popup-box h2 {
            color: #9d1e49;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .popup-box p {
            color: #7d5a6b;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .popup-btn {
            background: linear-gradient(135deg, #f72585, #7209b7);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(247, 37, 133, 0.4);
            transition: transform 0.2s;
        }

        .popup-btn:hover {
            transform: scale(1.05);
        }

        /* मुख्य कंटेनर - ग्लासमोर्फिज्म लुक (Glassmorphism) */
        .wedding-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(221, 142, 165, 0.3);
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
        }

        /* सुंदर हेडर और डेकोरेशन एलिमेंट्स */
        .decor-emoji {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 2.2rem;
            color: #9d1e49;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sub-heading {
            font-size: 1.05rem;
            color: #bc4773;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* काउंटडाउन टाइमर स्टाइल */
        .countdown-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 10px;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 194, 209, 0.5);
            transition: transform 0.3s ease;
        }

        .countdown-box:hover {
            transform: translateY(-4px);
        }

        .time-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #9d1e49;
            display: block;
            line-height: 1.2;
        }

        .time-label {
            font-size: 0.75rem;
            color: #7d5a6b;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 4px;
            display: block;
        }

        /* ग्रीटिंग मैसेज */
        .greetings-msg {
            font-size: 1.35rem;
            color: #880e4f;
            font-weight: 600;
            margin-bottom: 30px;
            padding: 12px 20px;
            background: linear-gradient(90deg, rgba(255,194,209,0.3), rgba(255,229,236,0.3));
            border-left: 4px solid #ff85a1;
            border-right: 4px solid #ff85a1;
            border-radius: 8px;
            line-height: 1.4;
        }

        /* फोटो फ्रेम और इमेज कंटेनर */
        .photo-frame {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 15px auto;
            border-radius: 18px;
            padding: 10px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            object-fit: cover;
        }

        .venue-date {
            margin-top: 25px;
            font-size: 1rem;
            color: #644856;
            font-weight: 500;
        }

        /* एनिमेशन */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* रिस्पॉन्सिव डिज़ाइन (Mobile View Compatibility) */
        @media (max-width: 480px) {
            .wedding-card {
                padding: 30px 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .time-value {
                font-size: 1.4rem;
            }
            .time-label {
                font-size: 0.65rem;
            }
            .greetings-msg {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>

    <!-- ऑडियो पॉपअप ओवरले (स्क्रीन पर कहीं भी क्लिक करने से हटेगा) -->
    <div id="audio-overlay" onclick="startCelebration()">
        <div class="popup-box">
            <h2>Welcome to Sharma Ji's Wedding! 🎉</h2>
            <p>Tap anywhere </p>
            <button class="popup-btn">Start ✨</button>
        </div>
    </div>

    <!-- मुख्य कार्ड कंटेंट -->
    <div class="wedding-card">
        <span class="decor-emoji">✨ 💍 ✨</span>
        <h1>Save The Date</h1>
        <div class="sub-heading">The Wedding Celebration</div>

        <div class="countdown-wrapper">
            <div class="countdown-box">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="countdown-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="countdown-box">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="countdown-box">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <div class="greetings-msg">
            "Sharma Ji, Abhi to bahut time baki h...😅" 
        </div>

        <div class="photo-frame">
    <!-- Pehli Image -->
<img src="pic2.jpg" alt="Bhai Ki Shaadi" onerror="this.onerror=null; this.src='https://plain-apac-prod-public.komododecks.com/202605/23/Fkw0z1daLh8uSO40Ozpw/image.jpg';">
    
</div>

<div class="photo-frame">
    <!-- Dusri Image (Aapke naye link ke sath) -->
<img src="pic1.jpg" alt="Bhai Ki Shaadi" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1519741497674-611481863552?w=500&auto=format&fit=crop&q=60';">
  
</div>



        <div class="venue-date">
            <p>📅 Monday, 22 June 2026</p>
            <p>📍 Isi Gole par 🌍</p>
        </div>
    </div>

    <!-- बैकग्राउंड संगीत (audio1) -->
    <audio id="audio1" loop>
        <source src="audio1.mp3" type="audio/mpeg">
        <source src="audio1.ogg" type="audio/ogg">
    </audio>

    <script>
        // ऑडियो शुरू करने और पॉपअप हटाने का लॉजिक
        function startCelebration() {
            const audio = document.getElementById("audio1");
            const overlay = document.getElementById("audio-overlay");
            
            // ऑडियो प्ले करें
            audio.play().catch(error => {
                console.log("Audio play failed or blocked:", error);
            });
            
            // पॉपअप छुपाएं
            overlay.style.display = "none";
        }

        function initWeddingCountdown() {
            // शादी की सही तारीख: 22 June 2026
            const targetDate = new Date("June 22, 2026 00:00:00").getTime();

            const interval = setInterval(function() {
                const now = new Date().getTime();
                const difference = targetDate - now;

                // गणना: दिन, घंटे, मिनट और सेकंड
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                // वैल्यूज को दो डिजिट में दिखाने के लिए (जैसे 09, 05)
                document.getElementById("days").innerText = days < 10 ? "0" + days : days;
                document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

                // अगर काउंटडाउन पूरा हो जाता है (शादी का दिन आ गया)
                if (difference < 0) {
                    clearInterval(interval);
                    document.querySelector(".countdown-wrapper").innerHTML = 
                        "<div style='grid-column: span 4; font-size: 1.5rem; font-weight: bold; color: #9d1e49; padding: 10px;'>🎉 Shaadi Mubarak Sharma Ji! 🍾</div>";
                }
            }, 1000);
        }

        // पेज लोड होने पर टाइमर शुरू करें
        window.onload = initWeddingCountdown;
    </script>
</body>
</html>
